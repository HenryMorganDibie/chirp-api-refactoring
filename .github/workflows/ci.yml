name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRPC_JWT_SECRET: "ci-test-secret-at-least-32-chars!!"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python lint tools
        run: pip install ruff
      - name: Lint TypeScript packages
        run: moon run shared-types:lint grpc-client:lint ui:lint client-user:lint client-admin:lint || true
      - name: Lint Python
        working-directory: apps/api
        run: python -m ruff check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python type check tools
        run: pip install mypy bcrypt pyjwt sqlalchemy grpcio protobuf grpcio-tools mypy-protobuf grpc-stubs
      - name: Type check TypeScript packages
        run: moon run shared-types:typecheck grpc-client:typecheck ui:typecheck || true
      - name: Type check Python
        working-directory: apps/api
        run: python -m mypy chirp_api

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python test dependencies
        working-directory: apps/api
        run: pip install uv && uv pip install --system -e ".[dev]" 2>/dev/null || pip install pytest bcrypt pyjwt sqlalchemy grpcio protobuf grpcio-tools
      - name: Run Python tests
        working-directory: apps/api
        env:
          GRPC_JWT_SECRET: "ci-test-secret-at-least-32-chars!!"
        run: python -m pytest tests/ -v
      - name: Run TypeScript unit tests
        run: moon run ui:test shared-types:test || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build TypeScript packages
        run: moon run :build
