name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRPC_JWT_SECRET: "ci-test-secret-at-least-32-chars!!"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python dependencies into system Python
        working-directory: apps/api
        run: pip install uv && uv pip install --system -r <(uv export --no-hashes) 2>/dev/null || pip install ruff mypy bcrypt pyjwt sqlalchemy grpcio protobuf
      - name: Lint
        run: moon run :lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python dependencies
        working-directory: apps/api
        run: pip install ruff mypy bcrypt pyjwt sqlalchemy grpcio protobuf grpcio-tools mypy-protobuf grpc-stubs
      - name: Type check
        run: moon run :typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Python dependencies
        working-directory: apps/api
        run: pip install uv && uv sync && uv pip install --system bcrypt pyjwt sqlalchemy grpcio protobuf pytest bcrypt
      - name: Run tests
        env:
          GRPC_JWT_SECRET: "ci-test-secret-at-least-32-chars!!"
        run: |
          cd apps/api
          GRPC_JWT_SECRET="ci-test-secret-at-least-32-chars!!" python -m pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build
        run: moon run :build
