language: 'python'
layer: 'application'

dependsOn:
  - id: 'proto'

tasks:
  dev:
    command: 'python -m chirp_api.main'
    options:
      persistent: true
      cache: false

  start:
    command: 'python -m chirp_api.main'
    options:
      persistent: true
      cache: false

  test:
    command: 'python -m pytest tests/ -v'
    inputs:
      - 'chirp_api/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
    env:
      GRPC_JWT_SECRET: 'ci-test-secret-at-least-32-chars!!'
    options:
      mergeArgs: 'replace'
      cache: false

  lint:
    command: 'python -m ruff check .'
    inputs:
      - 'chirp_api/**/*.py'
      - 'tests/**/*.py'
    options:
      mergeArgs: 'replace'
      cache: false

  typecheck:
    command: 'python -m mypy chirp_api'
    inputs:
      - 'chirp_api/**/*.py'
    options:
      mergeArgs: 'replace'
      cache: false

  db-seed:
    command: 'python -m chirp_api.db.seed'
    options:
      cache: false

  db-migrate:
    command: 'python -m alembic upgrade head'
    options:
      cache: false
